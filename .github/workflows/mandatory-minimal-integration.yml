name: mandatory-minimal-integration

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "work"]

jobs:
  minimal-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Run mandatory smoke integration
        env:
          RUN_SMOKE_INTEGRATION: "1"
          GEMINI_API_KEY: "test-key"
          MIMO_API_KEY: "test-key"
        run: |
          pytest -q tests/test_regression_stability.py::SmokeIntegrationTests::test_playwright_and_flutter_quality_gate_smoke
